<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Blue Lock - Lector de Manga</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: black;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .custom-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 3000;
            text-align: center;
            font-size: 14px;
            border: 1px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,0.3);
            animation: fadeInOut 2s ease-in-out forwards;
            pointer-events: none;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
        }

        .reader-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            padding: 12px 16px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(0,212,255,0.3);
            flex-wrap: wrap;
            gap: 10px;
        }

        .reader-footer.hidden {
            transform: translateY(100%);
        }

        .page-indicator {
            background: rgba(0,212,255,0.15);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(0,212,255,0.3);
            color: #00d4ff;
            font-weight: bold;
        }

        .chapter-nav-buttons {
            display: flex;
            gap: 10px;
        }

        .chapter-nav-buttons button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .chapter-nav-buttons button:active {
            transform: scale(0.95);
            background: #00d4ff;
            color: black;
        }

        /* Selector de capítulos */
        .chapter-selector {
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(0,212,255,0.3);
        }

        .chapter-selector select {
            background: rgba(0,212,255,0.1);
            border: 1px solid rgba(0,212,255,0.3);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .chapter-selector select option {
            background: #1a1a2e;
            color: white;
        }

        .chapter-selector label {
            color: #00d4ff;
            font-size: 12px;
        }

        .cascada-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            padding: 0;
            margin: 0;
        }

        .cascada-container img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
            background: black;
        }

        /* Sección de comentarios Giscus */
        .comments-section {
            padding: 30px 20px 100px 20px;
            background: #0a0a1a;
            border-top: 2px solid #00d4ff;
            margin-top: 20px;
        }

        .comments-title {
            color: #00d4ff;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00d4ff;
            text-align: center;
            z-index: 2000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0,212,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="reader-footer" id="readerFooter">
        <div class="page-indicator" id="pageIndicator">📄 -- / --</div>
        <div class="chapter-selector" id="chapterSelector">
            <label>📚 Ir a capítulo:</label>
            <select id="chapterSelect"></select>
        </div>
        <div class="chapter-nav-buttons">
            <button id="prevChapterBtn">⏮ Ant.</button>
            <button id="nextChapterBtn">Sig. ⏭</button>
        </div>
    </div>

    <div id="readerContent"></div>
    
    <div class="comments-section" id="commentsSection">
        <div class="comments-title">
            <span>💬</span>
            <span>Comentarios</span>
        </div>
        <div id="giscus-container"></div>
    </div>

    <script>
        const BASE_URL = 'https://ilsonmangas.github.io/mangas.github.io';
        let currentChapter = null;
        let totalPages = 0;
        let currentPage = 1;
        let totalChapters = [];
        let currentType = 'manga';
        let currentBaseUrl = 'caps';
        let scrollTimeout;
        let imageHeights = [];

        function showNotification(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'custom-toast';
            toast.textContent = message;
            if (isError) toast.style.borderColor = '#ff3366';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function getParamsFromURL() {
            const params = new URLSearchParams(window.location.search);
            const chapter = parseInt(params.get('chapter'));
            const type = params.get('type') || 'manga';
            const baseUrl = params.get('baseUrl') || 'caps';
            return {
                chapter: !isNaN(chapter) ? chapter : 345,
                type: type,
                baseUrl: baseUrl
            };
        }

        function notifyFlutter(chapterNumber, chapterTitle) {
            if (window.ChapterNotifier) {
                window.ChapterNotifier.postMessage(JSON.stringify({
                    chapter: chapterNumber,
                    title: chapterTitle
                }));
            }
        }

        async function loadChaptersList() {
            try {
                let apiUrl = currentType === 'spinoff' 
                    ? `${BASE_URL}/api/episode_nagi.json`
                    : `${BASE_URL}/api/chapters.json`;
                
                const response = await fetch(apiUrl);
                const data = await response.json();
                totalChapters = data.chapters || [];
                totalChapters.sort((a, b) => b.number - a.number);
                populateChapterSelect();
                return totalChapters;
            } catch (error) {
                console.error('Error cargando capítulos:', error);
                return [];
            }
        }

        function populateChapterSelect() {
            const select = document.getElementById('chapterSelect');
            if (!select) return;
            
            select.innerHTML = '';
            totalChapters.forEach(chap => {
                const option = document.createElement('option');
                option.value = chap.number;
                option.textContent = `Capítulo ${chap.number}`;
                if (currentChapter && chap.number === currentChapter.number) {
                    option.selected = true;
                }
                select.appendChild(option);
            });
            
            select.onchange = () => {
                const newChapter = parseInt(select.value);
                if (newChapter !== currentChapter.number) {
                    jumpToChapter(newChapter);
                }
            };
        }

        function jumpToChapter(chapterNumber) {
            const newChapter = totalChapters.find(c => c.number === chapterNumber);
            if (newChapter) {
                notifyFlutter(newChapter.number, newChapter.title);
                window.location.href = `lector.html?chapter=${newChapter.number}&type=${currentType}&baseUrl=${currentBaseUrl}`;
            }
        }

        async function loadChapter(chapterNumber, type, baseUrl) {
            const loadingDiv = document.getElementById('readerContent');
            loadingDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Cargando Capítulo ${chapterNumber}...</div>
                </div>
            `;

            try {
                const chapters = await loadChaptersList();
                const chapterInfo = chapters.find(c => c.number === chapterNumber);
                
                if (chapterInfo) {
                    currentChapter = chapterInfo;
                    totalPages = currentChapter.pages;
                } else {
                    totalPages = 50;
                    currentChapter = { 
                        id: chapterNumber, 
                        number: chapterNumber, 
                        title: `Capítulo ${chapterNumber}`, 
                        pages: 50,
                        volume: 1
                    };
                }

                const imageUrls = [];
                for (let i = 1; i <= totalPages; i++) {
                    let url = type === 'spinoff'
                        ? `${BASE_URL}/${baseUrl}/${chapterNumber}/${i}.jpg`
                        : `${BASE_URL}/caps/${chapterNumber}/${i}.jpg`;
                    imageUrls.push(url);
                }

                renderReader(imageUrls);
                loadGiscus();
                
            } catch (error) {
                console.error('Error:', error);
                loadingDiv.innerHTML = `
                    <div class="loading">
                        <div>❌ Error al cargar el capítulo</div>
                        <button onclick="location.reload()" style="margin-top:16px;padding:8px 16px;background:#00d4ff;border:none;border-radius:8px;color:black;">Reintentar</button>
                    </div>
                `;
            }
        }

        function loadGiscus() {
            const giscusContainer = document.getElementById('giscus-container');
            if (!giscusContainer) return;
            
            giscusContainer.innerHTML = '';
            
            const script = document.createElement('script');
            script.src = 'https://giscus.app/client.js';
            script.setAttribute('data-repo', 'ilsonmangas/mangas.github.io');
            script.setAttribute('data-repo-id', 'R_kgDOMV-O0Q');
            script.setAttribute('data-category', 'Announcements');
            script.setAttribute('data-category-id', 'DIC_kwDOMV-O0M4Ci89M');
            script.setAttribute('data-mapping', 'specific');
            script.setAttribute('data-term', `Capítulo ${currentChapter.number}`);
            script.setAttribute('data-reactions-enabled', '1');
            script.setAttribute('data-emit-metadata', '0');
            script.setAttribute('data-input-position', 'top');
            script.setAttribute('data-theme', 'dark');
            script.setAttribute('data-lang', 'es');
            script.setAttribute('crossorigin', 'anonymous');
            script.async = true;
            
            giscusContainer.appendChild(script);
        }

        function renderReader(imageUrls) {
            const container = document.getElementById('readerContent');
            
            container.innerHTML = `
                <div class="cascada-container" id="cascadaContainer">
                    ${imageUrls.map((url, idx) => `
                        <img src="${url}" 
                             loading="lazy"
                             onerror="this.style.display='none'"
                             alt="Página ${idx + 1}"
                             data-page="${idx + 1}"
                             class="manga-page">
                    `).join('')}
                </div>
            `;
            
            const images = document.querySelectorAll('.manga-page');
            let loadedCount = 0;
            
            function checkAllLoaded() {
                loadedCount++;
                if (loadedCount === images.length) {
                    calculateImageHeights();
                    loadLastPageAndPosition();
                    const cascadaContainer = document.getElementById('cascadaContainer');
                    if (cascadaContainer) {
                        cascadaContainer.addEventListener('scroll', () => {
                            updateCurrentPageFromScroll();
                            toggleUIOnScroll();
                        });
                    }
                }
            }
            
            images.forEach(img => {
                if (img.complete) {
                    checkAllLoaded();
                } else {
                    img.addEventListener('load', checkAllLoaded);
                    img.addEventListener('error', checkAllLoaded);
                }
            });
            
            const loadingDiv = document.querySelector('.loading');
            if (loadingDiv) loadingDiv.remove();
        }
        
        function calculateImageHeights() {
            const images = document.querySelectorAll('.manga-page');
            imageHeights = [];
            images.forEach(img => {
                imageHeights.push(img.clientHeight);
            });
        }

        function loadLastPageAndPosition() {
            const savedPage = localStorage.getItem(`lastPage_${currentChapter.id}_${currentType}`);
            if (savedPage) {
                currentPage = parseInt(savedPage);
                currentPage = Math.min(currentPage, totalPages);
                updatePageIndicator();
                
                setTimeout(() => {
                    const container = document.getElementById('cascadaContainer');
                    if (container && imageHeights.length > 0) {
                        let accumulatedHeight = 0;
                        for (let i = 0; i < currentPage - 1 && i < imageHeights.length; i++) {
                            accumulatedHeight += imageHeights[i];
                        }
                        container.scrollTop = accumulatedHeight;
                    }
                }, 100);
            } else {
                updatePageIndicator();
            }
        }

        function updateCurrentPageFromScroll() {
            const container = document.getElementById('cascadaContainer');
            if (!container || imageHeights.length === 0) return;
            
            const scrollTop = container.scrollTop;
            const windowHeight = window.innerHeight;
            let accumulatedHeight = 0;
            let newPage = 1;
            
            for (let i = 0; i < imageHeights.length; i++) {
                const imgHeight = imageHeights[i];
                const imageTop = accumulatedHeight;
                const imageBottom = imageTop + imgHeight;
                
                const viewportCenter = scrollTop + (windowHeight / 2);
                
                if (viewportCenter >= imageTop && viewportCenter <= imageBottom) {
                    newPage = i + 1;
                    break;
                }
                accumulatedHeight += imgHeight;
            }
            
            if (newPage !== currentPage && newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                updatePageIndicator();
                saveLastPage();
            }
        }

        function toggleUIOnScroll() {
            const footer = document.getElementById('readerFooter');
            footer.classList.add('hidden');
            
            if (scrollTimeout) clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                footer.classList.remove('hidden');
            }, 2000);
        }

        let uiManualHidden = false;
        document.body.addEventListener('click', (e) => {
            if (e.target.closest('button') || e.target.closest('select')) return;
            uiManualHidden = !uiManualHidden;
            const footer = document.getElementById('readerFooter');
            footer.classList.toggle('hidden', uiManualHidden);
        });

        function updatePageIndicator() {
            const indicator = document.getElementById('pageIndicator');
            if (indicator && totalPages > 0) {
                indicator.textContent = `📄 ${currentPage} / ${totalPages}`;
            }
        }

        function saveLastPage() {
            if (currentChapter) {
                localStorage.setItem(`lastPage_${currentChapter.id}_${currentType}`, currentPage);
                localStorage.setItem('lastChapterId', currentChapter.id);
                localStorage.setItem('lastType', currentType);
            }
        }

        let touchStartX = 0;
        let touchStartY = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                if (deltaX > 0) {
                    prevPage();
                } else {
                    nextPage();
                }
            }
        });

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                goToPage(currentPage);
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                goToPage(currentPage);
            }
        }

        function goToPage(page) {
            const container = document.getElementById('cascadaContainer');
            if (container && imageHeights.length > 0 && page >= 1 && page <= totalPages) {
                let accumulatedHeight = 0;
                for (let i = 0; i < page - 1 && i < imageHeights.length; i++) {
                    accumulatedHeight += imageHeights[i];
                }
                container.scrollTo({ top: accumulatedHeight, behavior: 'smooth' });
                currentPage = page;
                updatePageIndicator();
                saveLastPage();
            }
        }

        async function nextChapter() {
            const currentIndex = totalChapters.findIndex(c => c.id === currentChapter.id);
            if (currentIndex > 0) {
                const nextChap = totalChapters[currentIndex - 1];
                notifyFlutter(nextChap.number, nextChap.title);
                window.location.href = `lector.html?chapter=${nextChap.number}&type=${currentType}&baseUrl=${currentBaseUrl}`;
            } else {
                showNotification('📖 ¡Es el último capítulo!');
            }
        }

        async function prevChapter() {
            const currentIndex = totalChapters.findIndex(c => c.id === currentChapter.id);
            if (currentIndex < totalChapters.length - 1) {
                const prevChap = totalChapters[currentIndex + 1];
                notifyFlutter(prevChap.number, prevChap.title);
                window.location.href = `lector.html?chapter=${prevChap.number}&type=${currentType}&baseUrl=${currentBaseUrl}`;
            } else {
                showNotification('📖 ¡Es el primer capítulo!');
            }
        }

        async function init() {
            const params = getParamsFromURL();
            currentType = params.type;
            currentBaseUrl = params.baseUrl;
            
            await loadChaptersList();
            await loadChapter(params.chapter, currentType, currentBaseUrl);
            
            document.getElementById('prevChapterBtn').onclick = prevChapter;
            document.getElementById('nextChapterBtn').onclick = nextChapter;
        }

        init();
    </script>
</body>
</html>
