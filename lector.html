<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Blue Lock - Lector de Manga</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: black;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* Barra superior - SOLO TÍTULO */
        .reader-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 16px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
            text-align: center;
        }

        .reader-header.hidden {
            transform: translateY(-100%);
        }

        .chapter-number {
            color: #00d4ff;
            font-weight: bold;
            font-size: 14px;
        }

        .chapter-title {
            font-size: 12px;
            color: #ccc;
            display: block;
            margin-top: 4px;
        }

        /* Barra inferior - SOLO INDICADOR DE PÁGINA */
        .reader-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            font-size: 12px;
            transition: transform 0.3s ease;
            text-align: center;
        }

        .reader-footer.hidden {
            transform: translateY(100%);
        }

        .page-indicator {
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Contenedor de imágenes - MODO CASCADA */
        .cascada-container {
            padding-top: 60px;
            padding-bottom: 60px;
        }

        .cascada-container img {
            width: 100%;
            display: block;
            background: black;
        }

        /* Contenedor de imágenes - MODO PÁGINAS */
        .pages-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            height: 100vh;
            scroll-behavior: smooth;
        }

        .pages-container .page {
            flex: 0 0 100%;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
        }

        .pages-container img {
            width: 100%;
            height: auto;
            max-height: 100vh;
            object-fit: contain;
        }

        /* Selector de modo */
        .mode-selector {
            position: fixed;
            right: 16px;
            bottom: 70px;
            background: rgba(0,0,0,0.9);
            border-radius: 30px;
            padding: 8px;
            z-index: 1000;
            display: flex;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .mode-selector.hidden {
            display: none;
        }

        .mode-btn {
            background: none;
            border: none;
            padding: 10px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 20px;
        }

        .mode-btn.active {
            background: #00d4ff;
            color: black;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00d4ff;
            text-align: center;
            z-index: 2000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,212,255,0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Ocultar scrollbar en modo páginas */
        .pages-container::-webkit-scrollbar {
            display: none;
        }

        /* Navegación por gestos - swipe */
        .swipe-area {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 30%;
            z-index: 999;
        }

        .swipe-left {
            right: 0;
        }

        .swipe-right {
            left: 0;
        }
    </style>
</head>
<body>
    <!-- Barra superior - solo título -->
    <div class="reader-header" id="readerHeader">
        <div>
            <span class="chapter-number" id="chapterNumber">Capítulo --</span>
            <span class="chapter-title" id="chapterTitle"></span>
        </div>
    </div>

    <!-- Selector de modo (cascada/páginas) -->
    <div class="mode-selector" id="modeSelector">
        <button class="mode-btn" id="cascadaBtn" title="Modo cascada (vertical)">📜</button>
        <button class="mode-btn" id="paginasBtn" title="Modo páginas (horizontal)">📖</button>
    </div>

    <!-- Barra inferior - solo indicador de página -->
    <div class="reader-footer" id="readerFooter">
        <div class="page-indicator" id="pageIndicator">📄 -- / --</div>
    </div>

    <!-- Contenido del lector -->
    <div id="readerContent"></div>

    <script>
        // ==================== CONFIGURACIÓN ====================
        const BASE_URL = 'https://ilsonmangas.github.io/mangas.github.io';
        let currentChapter = null;
        let totalPages = 0;
        let currentPage = 1;
        let currentMode = 'cascada';
        let totalChapters = [];

        // Obtener capítulo de la URL (?chapter=345)
        function getChapterFromURL() {
            const params = new URLSearchParams(window.location.search);
            const chapter = parseInt(params.get('chapter'));
            return !isNaN(chapter) ? chapter : 345;
        }

        // Cargar lista de capítulos desde tu API
        async function loadChaptersList() {
            try {
                const response = await fetch(`${BASE_URL}/api/chapters.json`);
                const data = await response.json();
                totalChapters = data.chapters || [];
                totalChapters.sort((a, b) => b.number - a.number);
                return totalChapters;
            } catch (error) {
                console.error('Error cargando capítulos:', error);
                return [];
            }
        }

        // Cargar las imágenes del capítulo actual
        async function loadChapter(chapterNumber) {
            const loadingDiv = document.getElementById('readerContent');
            loadingDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Cargando Capítulo ${chapterNumber}...</div>
                </div>
            `;

            try {
                const chapters = await loadChaptersList();
                const chapterInfo = chapters.find(c => c.number === chapterNumber);
                
                if (chapterInfo) {
                    currentChapter = chapterInfo;
                    totalPages = currentChapter.pages;
                } else {
                    totalPages = 50;
                    currentChapter = { 
                        id: chapterNumber, 
                        number: chapterNumber, 
                        title: `Capítulo ${chapterNumber}`, 
                        pages: 50,
                        volume: 1
                    };
                }

                document.getElementById('chapterNumber').innerText = `Capítulo ${currentChapter.number}`;
                document.getElementById('chapterTitle').innerText = currentChapter.title || '';

                const imageUrls = [];
                for (let i = 1; i <= totalPages; i++) {
                    imageUrls.push(`${BASE_URL}/caps/${currentChapter.id}/${i}.jpg`);
                }

                renderReader(imageUrls);
                loadLastPageAndPosition();
                
            } catch (error) {
                console.error('Error:', error);
                loadingDiv.innerHTML = `
                    <div class="loading">
                        <div>❌ Error al cargar el capítulo</div>
                        <button onclick="location.reload()" style="margin-top:16px;padding:8px 16px;background:#00d4ff;border:none;border-radius:8px;color:black;">Reintentar</button>
                    </div>
                `;
            }
        }

        function renderReader(imageUrls) {
            const container = document.getElementById('readerContent');
            
            if (currentMode === 'cascada') {
                container.innerHTML = `
                    <div class="cascada-container" id="cascadaContainer">
                        ${imageUrls.map((url, idx) => `
                            <img src="${url}" 
                                 loading="lazy"
                                 onerror="this.style.display='none'"
                                 alt="Página ${idx + 1}">
                        `).join('')}
                    </div>
                `;
                
                const cascadaContainer = document.getElementById('cascadaContainer');
                if (cascadaContainer) {
                    cascadaContainer.addEventListener('scroll', () => {
                        updateCurrentPageFromScroll();
                        toggleUIOnScroll();
                    });
                }
            } else {
                container.innerHTML = `
                    <div class="pages-container" id="pagesContainer">
                        ${imageUrls.map((url, idx) => `
                            <div class="page" data-page="${idx + 1}">
                                <img src="${url}" 
                                     onerror="this.style.display='none'"
                                     alt="Página ${idx + 1}">
                            </div>
                        `).join('')}
                    </div>
                `;
                
                const pagesContainer = document.getElementById('pagesContainer');
                if (pagesContainer) {
                    pagesContainer.addEventListener('scroll', () => {
                        const scrollLeft = pagesContainer.scrollLeft;
                        const pageWidth = pagesContainer.clientWidth;
                        const newPage = Math.round(scrollLeft / pageWidth) + 1;
                        if (newPage !== currentPage && newPage >= 1 && newPage <= totalPages) {
                            currentPage = newPage;
                            updatePageIndicator();
                            saveLastPage();
                        }
                        toggleUIOnScroll();
                    });
                }
            }
            
            const loadingDiv = document.querySelector('.loading');
            if (loadingDiv) loadingDiv.remove();
        }

        function loadLastPageAndPosition() {
            const savedPage = localStorage.getItem(`lastPage_${currentChapter.id}`);
            if (savedPage) {
                currentPage = parseInt(savedPage);
                currentPage = Math.min(currentPage, totalPages);
                updatePageIndicator();
                
                setTimeout(() => {
                    if (currentMode === 'cascada') {
                        const container = document.getElementById('cascadaContainer');
                        if (container) {
                            let accumulatedHeight = 0;
                            const images = container.querySelectorAll('img');
                            for (let i = 0; i < currentPage - 1 && i < images.length; i++) {
                                accumulatedHeight += images[i].clientHeight;
                            }
                            container.scrollTop = accumulatedHeight;
                        }
                    } else {
                        const container = document.getElementById('pagesContainer');
                        if (container) {
                            container.scrollLeft = (currentPage - 1) * container.clientWidth;
                        }
                    }
                }, 300);
            } else {
                updatePageIndicator();
            }
        }

        function updateCurrentPageFromScroll() {
            const container = document.getElementById('cascadaContainer');
            if (!container) return;
            
            const scrollTop = container.scrollTop;
            const windowHeight = window.innerHeight;
            let accumulatedHeight = 0;
            let visiblePage = 1;
            
            const images = container.querySelectorAll('img');
            for (let i = 0; i < images.length; i++) {
                const imgHeight = images[i].clientHeight;
                const imageTop = accumulatedHeight;
                const imageBottom = imageTop + imgHeight;
                
                const viewportCenter = scrollTop + windowHeight / 2;
                
                if (viewportCenter >= imageTop && viewportCenter <= imageBottom) {
                    visiblePage = i + 1;
                    break;
                }
                accumulatedHeight += imgHeight;
            }
            
            if (visiblePage !== currentPage) {
                currentPage = visiblePage;
                updatePageIndicator();
                saveLastPage();
            }
        }

        let scrollTimeout;
        function toggleUIOnScroll() {
            const header = document.getElementById('readerHeader');
            const footer = document.getElementById('readerFooter');
            const selector = document.getElementById('modeSelector');
            
            header.classList.add('hidden');
            footer.classList.add('hidden');
            if (selector) selector.classList.add('hidden');
            
            if (scrollTimeout) clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                header.classList.remove('hidden');
                footer.classList.remove('hidden');
                if (selector) selector.classList.remove('hidden');
            }, 2000);
        }

        let uiManualHidden = false;
        document.body.addEventListener('click', (e) => {
            if (e.target.closest('button')) return;
            uiManualHidden = !uiManualHidden;
            const header = document.getElementById('readerHeader');
            const footer = document.getElementById('readerFooter');
            const selector = document.getElementById('modeSelector');
            
            if (uiManualHidden) {
                header.classList.add('hidden');
                footer.classList.add('hidden');
                if (selector) selector.classList.add('hidden');
            } else {
                header.classList.remove('hidden');
                footer.classList.remove('hidden');
                if (selector) selector.classList.remove('hidden');
            }
        });

        function updatePageIndicator() {
            const indicator = document.getElementById('pageIndicator');
            if (indicator) {
                indicator.innerText = `📄 ${currentPage} / ${totalPages}`;
            }
        }

        function saveLastPage() {
            if (currentChapter) {
                localStorage.setItem(`lastPage_${currentChapter.id}`, currentPage);
                localStorage.setItem('lastChapterId', currentChapter.id);
            }
        }

        // Navegación con gestos de swipe y teclas
        let touchStartX = 0;
        let touchStartY = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            // Swipe horizontal (solo si es más horizontal que vertical)
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                if (deltaX > 0) {
                    // Swipe derecha -> página anterior
                    prevPage();
                } else {
                    // Swipe izquierda -> página siguiente
                    nextPage();
                }
            }
        });

        // Navegación con teclas (para depuración en navegador)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                prevPage();
            } else if (e.key === 'ArrowRight') {
                nextPage();
            }
        });

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                goToPage(currentPage);
            } else {
                nextChapter();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                goToPage(currentPage);
            } else {
                prevChapter();
            }
        }

        function goToPage(page) {
            if (currentMode === 'cascada') {
                const container = document.getElementById('cascadaContainer');
                if (container) {
                    let accumulatedHeight = 0;
                    const images = container.querySelectorAll('img');
                    for (let i = 0; i < page - 1 && i < images.length; i++) {
                        accumulatedHeight += images[i].clientHeight;
                    }
                    container.scrollTo({ top: accumulatedHeight, behavior: 'smooth' });
                }
            } else {
                const container = document.getElementById('pagesContainer');
                if (container) {
                    container.scrollTo({ left: (page - 1) * container.clientWidth, behavior: 'smooth' });
                }
            }
            currentPage = page;
            updatePageIndicator();
            saveLastPage();
        }

        async function nextChapter() {
            const currentIndex = totalChapters.findIndex(c => c.id === currentChapter.id);
            if (currentIndex > 0) {
                const nextChap = totalChapters[currentIndex - 1];
                window.location.href = `lector.html?chapter=${nextChap.number}`;
            }
        }

        async function prevChapter() {
            const currentIndex = totalChapters.findIndex(c => c.id === currentChapter.id);
            if (currentIndex < totalChapters.length - 1) {
                const prevChap = totalChapters[currentIndex + 1];
                window.location.href = `lector.html?chapter=${prevChap.number}`;
            }
        }

        function setMode(mode) {
            currentMode = mode;
            localStorage.setItem('readerMode', mode);
            
            document.getElementById('cascadaBtn').classList.toggle('active', mode === 'cascada');
            document.getElementById('paginasBtn').classList.toggle('active', mode === 'paginas');
            
            if (currentChapter) {
                loadChapter(currentChapter.number);
            }
        }

        function loadSavedMode() {
            const savedMode = localStorage.getItem('readerMode');
            if (savedMode === 'paginas' || savedMode === 'cascada') {
                currentMode = savedMode;
            }
            document.getElementById('cascadaBtn').classList.toggle('active', currentMode === 'cascada');
            document.getElementById('paginasBtn').classList.toggle('active', currentMode === 'paginas');
        }

        async function init() {
            loadSavedMode();
            const chapterNum = getChapterFromURL();
            await loadChaptersList();
            await loadChapter(chapterNum);
            
            document.getElementById('cascadaBtn').onclick = () => setMode('cascada');
            document.getElementById('paginasBtn').onclick = () => setMode('paginas');
        }

        init();
    </script>
</body>
</html>
