<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Blue Lock - Lector de Manga</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: black;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
        }

        .custom-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 3000;
            text-align: center;
            font-size: 14px;
            border: 1px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,0.3);
            animation: fadeInOut 2s ease-in-out forwards;
            pointer-events: none;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
        }

        .reader-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            padding: 12px 16px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(0,212,255,0.2);
        }

        .reader-footer.hidden {
            transform: translateY(100%);
        }

        .page-indicator {
            background: rgba(0,212,255,0.1);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(0,212,255,0.3);
        }

        .chapter-nav-buttons {
            display: flex;
            gap: 10px;
        }

        .chapter-nav-buttons button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .chapter-nav-buttons button:active {
            transform: scale(0.9);
            background: #00d4ff;
            color: black;
        }

        .cascada-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            padding: 0; 
            margin: 0;
        }

        .cascada-container img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
            background: black;
        }

        .comments-section {
            padding: 30px 16px 120px 16px;
            background: #05050a;
            border-top: 2px solid #00d4ff;
            margin-top: -1px;
        }

        .comments-title {
            color: #00d4ff;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: black;
            z-index: 2000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0,212,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingScreen" class="loading">
        <div class="spinner"></div>
        <div id="loadingText">Entrando a la cancha...</div>
    </div>

    <div class="reader-footer" id="readerFooter">
        <div class="page-indicator" id="pageIndicator">📄 -- / --</div>
        <div class="chapter-nav-buttons">
            <button id="prevChapterBtn">⏮ Anterior Cap.</button>
            <button id="nextChapterBtn">Siguiente Cap. ⏭</button>
        </div>
    </div>

    <div id="readerContent"></div>

    <div class="comments-section" id="commentsSection" style="display: none;">
        <div class="comments-title">
            <span>💬</span>
            <span>Análisis del Partido (Comentarios)</span>
        </div>
        <div id="giscus_container"></div>
    </div>

    <script>
        const BASE_URL = 'https://ilsonmangas.github.io/mangas.github.io';
        let currentChapter = null;
        let totalPages = 0;
        let currentPage = 1;
        let totalChapters = [];

        function showNotification(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'custom-toast';
            toast.textContent = message;
            if (isError) toast.style.borderColor = '#ff3366';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function getChapterFromURL() {
            const params = new URLSearchParams(window.location.search);
            const chapter = parseInt(params.get('chapter'));
            return !isNaN(chapter) ? chapter : 345;
        }

        function notifyFlutter(chapterNumber, chapterTitle) {
            if (window.ChapterNotifier) {
                window.ChapterNotifier.postMessage(JSON.stringify({
                    chapter: chapterNumber,
                    title: chapterTitle
                }));
            }
        }

        function loadGiscus() {
            const container = document.getElementById('giscus_container');
            container.innerHTML = '';

            const script = document.createElement('script');
            script.src = 'https://giscus.app/client.js';
            script.setAttribute('data-repo', 'ilsonmangas/mi-blog-comments');
            script.setAttribute('data-repo-id', 'R_kgDOSS9Lwg');
            script.setAttribute('data-category', 'General');
            script.setAttribute('data-category-id', 'DIC_kwDOSS9Lws4C8PPK');
            script.setAttribute('data-mapping', 'pathname');
            script.setAttribute('data-strict', '0');
            script.setAttribute('data-reactions-enabled', '1');
            script.setAttribute('data-emit-metadata', '0');
            script.setAttribute('data-input-position', 'bottom');
            script.setAttribute('data-theme', 'preferred_color_scheme');
            script.setAttribute('data-lang', 'es');
            script.crossOrigin = 'anonymous';
            script.async = true;

            container.appendChild(script);
            document.getElementById('commentsSection').style.display = 'block';
        }

        async function loadChaptersList() {
            try {
                const response = await fetch(`${BASE_URL}/api/chapters.json`);
                const data = await response.json();
                totalChapters = data.chapters || [];
                totalChapters.sort((a, b) => b.number - a.number);
                return totalChapters;
            } catch (e) { return []; }
        }

        async function loadChapter(chapterNumber) {
            const container = document.getElementById('readerContent');
            try {
                const chapters = await loadChaptersList();
                const info = chapters.find(c => c.number === chapterNumber) || { id: chapterNumber, number: chapterNumber, pages: 50 };
                
                currentChapter = info;
                totalPages = info.pages;

                const imagesHtml = [];
                for (let i = 1; i <= totalPages; i++) {
                    imagesHtml.push(`<img src="${BASE_URL}/caps/${info.id}/${i}.jpg" loading="lazy" data-page="${i}" onerror="this.remove()">`);
                }

                container.innerHTML = `<div class="cascada-container">${imagesHtml.join('')}</div>`;
                
                document.getElementById('loadingScreen').style.display = 'none';
                updatePageIndicator();
                loadGiscus();
                
                window.addEventListener('scroll', handleScroll);
                
            } catch (error) {
                document.getElementById('loadingText').innerText = "❌ Error al cargar";
            }
        }

        function handleScroll() {
            const images = document.querySelectorAll('.cascada-container img');
            
            images.forEach((img) => {
                const rect = img.getBoundingClientRect();
                if (rect.top < window.innerHeight / 2 && rect.bottom > window.innerHeight / 2) {
                    const page = parseInt(img.getAttribute('data-page'));
                    if (page !== currentPage) {
                        currentPage = page;
                        updatePageIndicator();
                    }
                }
            });

            const footer = document.getElementById('readerFooter');
            footer.classList.add('hidden');
            clearTimeout(window.scrollTimer);
            window.scrollTimer = setTimeout(() => footer.classList.remove('hidden'), 1000);
        }

        function updatePageIndicator() {
            document.getElementById('pageIndicator').innerText = `📄 ${currentPage} / ${totalPages}`;
        }

        async function navigateChapter(direction) {
            const currentIndex = totalChapters.findIndex(c => c.number === currentChapter.number);
            const targetChap = totalChapters[currentIndex + (direction === 'next' ? -1 : 1)];

            if (targetChap) {
                notifyFlutter(targetChap.number, targetChap.title);
                window.location.href = `lector.html?chapter=${targetChap.number}`;
            } else {
                showNotification(direction === 'next' ? '¡Último capítulo!' : '¡Primer capítulo!');
            }
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('button') && !e.target.closest('#giscus_container')) {
                document.getElementById('readerFooter').classList.toggle('hidden');
            }
        });

        async function init() {
            const num = getChapterFromURL();
            await loadChapter(num);
            document.getElementById('prevChapterBtn').onclick = () => navigateChapter('prev');
            document.getElementById('nextChapterBtn').onclick = () => navigateChapter('next');
        }

        init();
    </script>
</body>
</html>
