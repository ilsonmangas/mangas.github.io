<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Blue Lock - Lector de Manga</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: black;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
        }

        /* =========================
           TOAST
        ========================= */

        .custom-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 3000;
            text-align: center;
            font-size: 14px;
            border: 1px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            animation: fadeInOut 2s ease-in-out forwards;
            pointer-events: none;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }

            15% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            85% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
        }

        /* =========================
           FOOTER
        ========================= */

        .reader-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;

            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(12px);

            border-top: 1px solid rgba(0, 212, 255, 0.3);

            padding: 12px 16px;

            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;

            z-index: 9999;

            transition: transform 0.3s ease;
        }

        .reader-footer.hidden {
            transform: translateY(100%);
        }

        .page-indicator {
            background: rgba(0, 212, 255, 0.15);

            border: 1px solid rgba(0, 212, 255, 0.35);

            color: white !important;

            padding: 8px 14px;

            border-radius: 20px;

            font-size: 13px;
            font-weight: 600;

            white-space: nowrap;
        }

        .chapter-nav-buttons {
            display: flex;
            gap: 10px;
        }

        .chapter-nav-buttons button {
            background: rgba(255, 255, 255, 0.08);

            border: none;

            color: white;

            padding: 9px 14px;

            border-radius: 12px;

            font-size: 12px;
            font-weight: 600;

            cursor: pointer;

            transition: all 0.2s ease;
        }

        .chapter-nav-buttons button:active {
            transform: scale(0.95);
            background: #00d4ff;
            color: black;
        }

        /* =========================
           READER
        ========================= */

        #readerContent {
            width: 100%;
        }

        .cascada-container {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .cascada-container img {
            width: 100%;
            height: auto;
            display: block;
            background: black;
        }

        /* =========================
           LOADING
        ========================= */

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            color: #00d4ff;

            text-align: center;

            z-index: 2000;
        }

        .spinner {
            width: 50px;
            height: 50px;

            border: 4px solid rgba(0, 212, 255, 0.12);
            border-top-color: #00d4ff;

            border-radius: 50%;

            animation: spin 1s linear infinite;

            margin: 0 auto 15px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* =========================
           MOBILE
        ========================= */

        @media (max-width: 600px) {
            .reader-footer {
                flex-direction: column;
                align-items: stretch;
            }

            .chapter-nav-buttons {
                width: 100%;
            }

            .chapter-nav-buttons button {
                flex: 1;
            }

            .page-indicator {
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <!-- FOOTER -->
    <div class="reader-footer" id="readerFooter">

        <div class="page-indicator" id="pageIndicator">
            📄 1 / 1
        </div>

        <div class="chapter-nav-buttons">
            <button id="prevChapterBtn">
                ⏮ Cap. anterior
            </button>

            <button id="nextChapterBtn">
                Cap. siguiente ⏭
            </button>
        </div>

    </div>

    <!-- CONTENIDO -->
    <div id="readerContent"></div>

    <script>

        const BASE_URL = 'https://ilsonmangas.github.io/mangas.github.io';

        let currentChapter = null;
        let totalPages = 0;
        let currentPage = 1;

        let totalChapters = [];

        let currentType = 'manga';
        let currentBaseUrl = 'caps';

        /* =========================
           TOAST
        ========================= */

        function showNotification(message, isError = false) {

            const toast = document.createElement('div');

            toast.className = 'custom-toast';
            toast.textContent = message;

            if (isError) {
                toast.style.borderColor = '#ff3366';
            }

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2500);
        }

        /* =========================
           URL PARAMS
        ========================= */

        function getParamsFromURL() {

            const params = new URLSearchParams(window.location.search);

            const chapter = parseInt(params.get('chapter'));
            const type = params.get('type') || 'manga';
            const baseUrl = params.get('baseUrl') || 'caps';

            return {
                chapter: !isNaN(chapter) ? chapter : 1,
                type: type,
                baseUrl: baseUrl
            };
        }

        /* =========================
           FLUTTER
        ========================= */

        function notifyFlutter(chapterNumber, chapterTitle) {

            if (window.ChapterNotifier) {

                window.ChapterNotifier.postMessage(
                    JSON.stringify({
                        chapter: chapterNumber,
                        title: chapterTitle
                    })
                );
            }
        }

        /* =========================
           CHAPTER LIST
        ========================= */

        async function loadChaptersList() {

            try {

                let apiUrl = '';

                if (currentType === 'spinoff') {
                    apiUrl = `${BASE_URL}/api/episode_nagi.json`;
                } else {
                    apiUrl = `${BASE_URL}/api/chapters.json`;
                }

                const response = await fetch(apiUrl);

                const data = await response.json();

                totalChapters = data.chapters || [];

                totalChapters.sort((a, b) => b.number - a.number);

                return totalChapters;

            } catch (error) {

                console.error('Error cargando capítulos:', error);

                return [];
            }
        }

        /* =========================
           LOAD CHAPTER
        ========================= */

        async function loadChapter(chapterNumber, type, baseUrl) {

            const loadingDiv = document.getElementById('readerContent');

            loadingDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Cargando Capítulo ${chapterNumber}...</div>
                </div>
            `;

            try {

                const chapters = await loadChaptersList();

                const chapterInfo = chapters.find(
                    c => c.number === chapterNumber
                );

                if (chapterInfo) {

                    currentChapter = chapterInfo;
                    totalPages = currentChapter.pages;

                } else {

                    totalPages = 50;

                    currentChapter = {
                        id: chapterNumber,
                        number: chapterNumber,
                        title: `Capítulo ${chapterNumber}`,
                        pages: 50
                    };
                }

                currentPage = 1;

                updatePageIndicator();

                const imageUrls = [];

                for (let i = 1; i <= totalPages; i++) {

                    let url = '';

                    if (type === 'spinoff') {

                        url = `${BASE_URL}/${baseUrl}/${chapterNumber}/${i}.jpg`;

                    } else {

                        url = `${BASE_URL}/caps/${chapterNumber}/${i}.jpg`;
                    }

                    imageUrls.push(url);
                }

                renderReader(imageUrls);

            } catch (error) {

                console.error('Error:', error);

                loadingDiv.innerHTML = `
                    <div class="loading">
                        <div>❌ Error al cargar el capítulo</div>

                        <button
                            onclick="location.reload()"
                            style="
                                margin-top:16px;
                                padding:8px 16px;
                                background:#00d4ff;
                                border:none;
                                border-radius:8px;
                                color:black;
                            "
                        >
                            Reintentar
                        </button>
                    </div>
                `;
            }
        }

        /* =========================
           RENDER
        ========================= */

        function renderReader(imageUrls) {

            const container = document.getElementById('readerContent');

            container.innerHTML = `
                <div class="cascada-container" id="cascadaContainer">

                    ${imageUrls.map((url, idx) => `
                        <img
                            src="${url}"
                            alt="Página ${idx + 1}"
                            data-page="${idx + 1}"
                            loading="lazy"
                            onerror="this.style.display='none'"
                        >
                    `).join('')}

                </div>
            `;

            setupScrollListener();

            setupImageLoadListeners();

            setTimeout(() => {
                loadLastPageAndPosition();
            }, 300);
        }

        /* =========================
           IMAGE LOAD LISTENERS
        ========================= */

        function setupImageLoadListeners() {

            const images = document.querySelectorAll('#cascadaContainer img');

            images.forEach((img) => {

                img.addEventListener('load', () => {

                    updateCurrentPageFromScroll();
                });
            });
        }

        /* =========================
           SCROLL LISTENER
        ========================= */

        function setupScrollListener() {

            window.addEventListener('scroll', () => {

                updateCurrentPageFromScroll();

                toggleUIOnScroll();

            }, {
                passive: true
            });
        }

        /* =========================
           LAST POSITION
        ========================= */

        function loadLastPageAndPosition() {

            const savedPage = localStorage.getItem(
                `lastPage_${currentChapter.id}_${currentType}`
            );

            if (savedPage) {

                currentPage = parseInt(savedPage);

                currentPage = Math.min(currentPage, totalPages);

                goToPage(currentPage, false);

            } else {

                currentPage = 1;

                updatePageIndicator();
            }
        }

        /* =========================
           PAGE DETECTION
        ========================= */

        function updateCurrentPageFromScroll() {

            const images = document.querySelectorAll('#cascadaContainer img');

            if (!images.length) return;

            const viewportMiddle = window.scrollY + (window.innerHeight / 2);

            let detectedPage = 1;

            images.forEach((img, index) => {

                const rect = img.getBoundingClientRect();

                const top = rect.top + window.scrollY;
                const bottom = top + rect.height;

                if (
                    viewportMiddle >= top &&
                    viewportMiddle <= bottom
                ) {
                    detectedPage = index + 1;
                }
            });

            if (detectedPage !== currentPage) {

                currentPage = detectedPage;

                updatePageIndicator();

                saveLastPage();
            }
        }

        /* =========================
           PAGE INDICATOR
        ========================= */

        function updatePageIndicator() {

            const indicator = document.getElementById('pageIndicator');

            if (!indicator) return;

            indicator.textContent =
                `📄 ${currentPage} / ${totalPages}`;

            indicator.style.color = '#ffffff';
        }

        /* =========================
           SAVE PAGE
        ========================= */

        function saveLastPage() {

            if (!currentChapter) return;

            localStorage.setItem(
                `lastPage_${currentChapter.id}_${currentType}`,
                currentPage
            );

            localStorage.setItem(
                'lastChapterId',
                currentChapter.id
            );

            localStorage.setItem(
                'lastType',
                currentType
            );
        }

        /* =========================
           UI HIDE
        ========================= */

        let scrollTimeout;

        function toggleUIOnScroll() {

            const footer = document.getElementById('readerFooter');

            footer.classList.add('hidden');

            clearTimeout(scrollTimeout);

            scrollTimeout = setTimeout(() => {

                footer.classList.remove('hidden');

            }, 1500);
        }

        let uiManualHidden = false;

        document.body.addEventListener('click', (e) => {

            if (e.target.closest('button')) return;

            uiManualHidden = !uiManualHidden;

            const footer = document.getElementById('readerFooter');

            footer.classList.toggle('hidden', uiManualHidden);
        });

        /* =========================
           PAGE NAVIGATION
        ========================= */

        function nextPage() {

            if (currentPage < totalPages) {

                currentPage++;

                goToPage(currentPage);
            }
        }

        function prevPage() {

            if (currentPage > 1) {

                currentPage--;

                goToPage(currentPage);
            }
        }

        function goToPage(page, smooth = true) {

            const images = document.querySelectorAll('#cascadaContainer img');

            if (!images[page - 1]) return;

            images[page - 1].scrollIntoView({
                behavior: smooth ? 'smooth' : 'auto',
                block: 'start'
            });

            currentPage = page;

            updatePageIndicator();

            saveLastPage();
        }

        /* =========================
           TOUCH SWIPE
        ========================= */

        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {

            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (
                Math.abs(deltaX) > Math.abs(deltaY) &&
                Math.abs(deltaX) > 50
            ) {

                if (deltaX > 0) {

                    prevPage();

                } else {

                    nextPage();
                }
            }
        });

        /* =========================
           CHAPTER NAVIGATION
        ========================= */

        async function nextChapter() {

            const currentIndex = totalChapters.findIndex(
                c => c.id === currentChapter.id
            );

            if (currentIndex > 0) {

                const nextChap = totalChapters[currentIndex - 1];

                notifyFlutter(
                    nextChap.number,
                    nextChap.title
                );

                window.location.href =
                    `lector.html?chapter=${nextChap.number}&type=${currentType}&baseUrl=${currentBaseUrl}`;

            } else {

                showNotification('📖 ¡Es el último capítulo!');
            }
        }

        async function prevChapter() {

            const currentIndex = totalChapters.findIndex(
                c => c.id === currentChapter.id
            );

            if (currentIndex < totalChapters.length - 1) {

                const prevChap = totalChapters[currentIndex + 1];

                notifyFlutter(
                    prevChap.number,
                    prevChap.title
                );

                window.location.href =
                    `lector.html?chapter=${prevChap.number}&type=${currentType}&baseUrl=${currentBaseUrl}`;

            } else {

                showNotification('📖 ¡Es el primer capítulo!');
            }
        }

        /* =========================
           INIT
        ========================= */

        async function init() {

            const params = getParamsFromURL();

            currentType = params.type;
            currentBaseUrl = params.baseUrl;

            await loadChaptersList();

            await loadChapter(
                params.chapter,
                currentType,
                currentBaseUrl
            );

            document.getElementById('prevChapterBtn')
                .onclick = prevChapter;

            document.getElementById('nextChapterBtn')
                .onclick = nextChapter;
        }

        init();

    </script>

</body>
</html>
