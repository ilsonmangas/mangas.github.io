<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Blue Lock - Lector de Manga</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: black;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* Notificación personalizada */
        .custom-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 3000;
            text-align: center;
            font-size: 14px;
            border: 1px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,0.3);
            animation: fadeInOut 2s ease-in-out forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
        }

        /* Barra inferior */
        .reader-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 8px 16px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reader-footer.hidden {
            transform: translateY(100%);
        }

        .page-indicator {
            background: rgba(0,0,0,0.7);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .chapter-nav-buttons {
            display: flex;
            gap: 12px;
        }

        .chapter-nav-buttons button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .chapter-nav-buttons button:active {
            transform: scale(0.95);
            background: #00d4ff;
            color: black;
        }

        /* Contenedor de imágenes - MODO CASCADA */
        .cascada-container {
            padding-top: 10px;
            padding-bottom: 80px;
        }

        .cascada-container img {
            width: 100%;
            display: block;
            background: black;
        }

        /* Sección de comentarios */
        .comments-section {
            padding: 20px 16px;
            background: #0a0a1a;
            border-top: 1px solid #00d4ff30;
        }

        .comments-title {
            color: #00d4ff;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00d4ff;
            text-align: center;
            z-index: 2000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,212,255,0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Barra inferior con indicador de página + botones capítulo -->
    <div class="reader-footer" id="readerFooter">
        <div class="page-indicator" id="pageIndicator">📄 -- / --</div>
        <div class="chapter-nav-buttons">
            <button id="prevChapterBtn">⏮ Cap anterior</button>
            <button id="nextChapterBtn">Cap siguiente ⏭</button>
        </div>
    </div>

    <!-- Contenido del lector -->
    <div id="readerContent"></div>

    <!-- Sección de comentarios Disqus -->
    <div class="comments-section" id="commentsSection" style="display: none;">
        <div class="comments-title">
            <span>💬</span>
            <span>Comentarios</span>
        </div>
        <div id="disqus_thread"></div>
    </div>

    <script>
        // ==================== CONFIGURACIÓN ====================
        const BASE_URL = 'https://ilsonmangas.github.io/mangas.github.io';
        let currentChapter = null;
        let totalPages = 0;
        let currentPage = 1;
        let totalChapters = [];

        // Mostrar notificación personalizada (moderna)
        function showNotification(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'custom-toast';
            toast.textContent = message;
            if (isError) {
                toast.style.borderColor = '#ff3366';
                toast.style.boxShadow = '0 0 20px rgba(255,51,102,0.3)';
            }
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }

        // Obtener capítulo de la URL (?chapter=345)
        function getChapterFromURL() {
            const params = new URLSearchParams(window.location.search);
            const chapter = parseInt(params.get('chapter'));
            return !isNaN(chapter) ? chapter : 345;
        }

        // Enviar mensaje a Flutter cuando cambia de capítulo
        function notifyFlutter(chapterNumber, chapterTitle) {
            if (window.ChapterNotifier) {
                window.ChapterNotifier.postMessage(JSON.stringify({
                    chapter: chapterNumber,
                    title: chapterTitle
                }));
            }
        }

        // Cargar Disqus comments
        function loadDisqus(chapterId, chapterTitle) {
            if (window.DISQUS) {
                window.DISQUS.reset({
                    reload: true,
                    config: function() {
                        this.page.identifier = `chapter_${chapterId}`;
                        this.page.title = `Capítulo ${chapterId}: ${chapterTitle}`;
                        this.page.url = `${BASE_URL}/lector.html?chapter=${chapterId}`;
                    }
                });
            } else {
                // Configurar Disqus
                const disqusScript = document.createElement('script');
                disqusScript.src = 'https://bluelockapp.disqus.com/embed.js';
                disqusScript.setAttribute('data-timestamp', Date.now());
                document.head.appendChild(disqusScript);
                
                window.disqus_config = function() {
                    this.page.identifier = `chapter_${chapterId}`;
                    this.page.title = `Capítulo ${chapterId}: ${chapterTitle}`;
                    this.page.url = `${BASE_URL}/lector.html?chapter=${chapterId}`;
                };
                
                document.getElementById('commentsSection').style.display = 'block';
            }
        }

        // Cargar lista de capítulos desde tu API
        async function loadChaptersList() {
            try {
                const response = await fetch(`${BASE_URL}/api/chapters.json`);
                const data = await response.json();
                totalChapters = data.chapters || [];
                totalChapters.sort((a, b) => b.number - a.number);
                return totalChapters;
            } catch (error) {
                console.error('Error cargando capítulos:', error);
                return [];
            }
        }

        // Cargar las imágenes del capítulo actual
        async function loadChapter(chapterNumber) {
            const loadingDiv = document.getElementById('readerContent');
            loadingDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Cargando Capítulo ${chapterNumber}...</div>
                </div>
            `;

            try {
                const chapters = await loadChaptersList();
                const chapterInfo = chapters.find(c => c.number === chapterNumber);
                
                if (chapterInfo) {
                    currentChapter = chapterInfo;
                    totalPages = currentChapter.pages;
                } else {
                    totalPages = 50;
                    currentChapter = { 
                        id: chapterNumber, 
                        number: chapterNumber, 
                        title: `Capítulo ${chapterNumber}`, 
                        pages: 50,
                        volume: 1
                    };
                }

                const imageUrls = [];
                for (let i = 1; i <= totalPages; i++) {
                    imageUrls.push(`${BASE_URL}/caps/${currentChapter.id}/${i}.jpg`);
                }

                renderReader(imageUrls);
                loadLastPageAndPosition();
                
                // Cargar comentarios después de renderizar
                setTimeout(() => {
                    loadDisqus(currentChapter.number, currentChapter.title);
                }, 500);
                
            } catch (error) {
                console.error('Error:', error);
                loadingDiv.innerHTML = `
                    <div class="loading">
                        <div>❌ Error al cargar el capítulo</div>
                        <button onclick="location.reload()" style="margin-top:16px;padding:8px 16px;background:#00d4ff;border:none;border-radius:8px;color:black;">Reintentar</button>
                    </div>
                `;
            }
        }

        // Renderizar el lector (solo modo cascada)
        function renderReader(imageUrls) {
            const container = document.getElementById('readerContent');
            
            container.innerHTML = `
                <div class="cascada-container" id="cascadaContainer">
                    ${imageUrls.map((url, idx) => `
                        <img src="${url}" 
                             loading="lazy"
                             onerror="this.style.display='none'"
                             alt="Página ${idx + 1}"
                             data-page="${idx + 1}">
                    `).join('')}
                </div>
            `;
            
            const cascadaContainer = document.getElementById('cascadaContainer');
            if (cascadaContainer) {
                // Detectar scroll para actualizar página actual
                cascadaContainer.addEventListener('scroll', () => {
                    updateCurrentPageFromScroll();
                    toggleUIOnScroll();
                });
            }
            
            const loadingDiv = document.querySelector('.loading');
            if (loadingDiv) loadingDiv.remove();
        }

        // Actualizar página actual basada en scroll (DINÁMICO)
        function updateCurrentPageFromScroll() {
            const container = document.getElementById('cascadaContainer');
            if (!container) return;
            
            const scrollTop = container.scrollTop;
            const windowHeight = window.innerHeight;
            let accumulatedHeight = 0;
            let visiblePage = 1;
            
            const images = container.querySelectorAll('img');
            for (let i = 0; i < images.length; i++) {
                const imgHeight = images[i].clientHeight;
                const imageTop = accumulatedHeight;
                const imageBottom = imageTop + imgHeight;
                
                // Centro del viewport
                const viewportCenter = scrollTop + windowHeight / 2;
                
                if (viewportCenter >= imageTop && viewportCenter <= imageBottom) {
                    visiblePage = i + 1;
                    break;
                }
                accumulatedHeight += imgHeight;
            }
            
            if (visiblePage !== currentPage) {
                currentPage = visiblePage;
                updatePageIndicator();
                saveLastPage();
            }
        }

        function loadLastPageAndPosition() {
            const savedPage = localStorage.getItem(`lastPage_${currentChapter.id}`);
            if (savedPage) {
                currentPage = parseInt(savedPage);
                currentPage = Math.min(currentPage, totalPages);
                updatePageIndicator();
                
                setTimeout(() => {
                    const container = document.getElementById('cascadaContainer');
                    if (container) {
                        let accumulatedHeight = 0;
                        const images = container.querySelectorAll('img');
                        for (let i = 0; i < currentPage - 1 && i < images.length; i++) {
                            accumulatedHeight += images[i].clientHeight;
                        }
                        container.scrollTop = accumulatedHeight;
                    }
                }, 300);
            } else {
                updatePageIndicator();
            }
        }

        let scrollTimeout;
        function toggleUIOnScroll() {
            const footer = document.getElementById('readerFooter');
            footer.classList.add('hidden');
            
            if (scrollTimeout) clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                footer.classList.remove('hidden');
            }, 2000);
        }

        let uiManualHidden = false;
        document.body.addEventListener('click', (e) => {
            if (e.target.closest('button')) return;
            uiManualHidden = !uiManualHidden;
            const footer = document.getElementById('readerFooter');
            footer.classList.toggle('hidden', uiManualHidden);
        });

        function updatePageIndicator() {
            const indicator = document.getElementById('pageIndicator');
            if (indicator) {
                indicator.innerText = `📄 ${currentPage} / ${totalPages}`;
            }
        }

        function saveLastPage() {
            if (currentChapter) {
                localStorage.setItem(`lastPage_${currentChapter.id}`, currentPage);
                localStorage.setItem('lastChapterId', currentChapter.id);
            }
        }

        // Navegación con gestos de swipe
        let touchStartX = 0;
        let touchStartY = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                if (deltaX > 0) {
                    prevPage();
                } else {
                    nextPage();
                }
            }
        });

        // Navegación de páginas
        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                goToPage(currentPage);
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                goToPage(currentPage);
            }
        }

        function goToPage(page) {
            const container = document.getElementById('cascadaContainer');
            if (container) {
                let accumulatedHeight = 0;
                const images = container.querySelectorAll('img');
                for (let i = 0; i < page - 1 && i < images.length; i++) {
                    accumulatedHeight += images[i].clientHeight;
                }
                container.scrollTo({ top: accumulatedHeight, behavior: 'smooth' });
            }
            currentPage = page;
            updatePageIndicator();
            saveLastPage();
        }

        // Navegación de capítulos con notificación moderna
        async function nextChapter() {
            const currentIndex = totalChapters.findIndex(c => c.id === currentChapter.id);
            if (currentIndex > 0) {
                const nextChap = totalChapters[currentIndex - 1];
                notifyFlutter(nextChap.number, nextChap.title);
                window.location.href = `lector.html?chapter=${nextChap.number}`;
            } else {
                showNotification('📖 ¡Es el último capítulo!');
            }
        }

        async function prevChapter() {
            const currentIndex = totalChapters.findIndex(c => c.id === currentChapter.id);
            if (currentIndex < totalChapters.length - 1) {
                const prevChap = totalChapters[currentIndex + 1];
                notifyFlutter(prevChap.number, prevChap.title);
                window.location.href = `lector.html?chapter=${prevChap.number}`;
            } else {
                showNotification('📖 ¡Es el primer capítulo!');
            }
        }

        async function init() {
            const chapterNum = getChapterFromURL();
            await loadChaptersList();
            await loadChapter(chapterNum);
            
            document.getElementById('prevChapterBtn').onclick = prevChapter;
            document.getElementById('nextChapterBtn').onclick = nextChapter;
        }

        init();
    </script>
</body>
</html>
